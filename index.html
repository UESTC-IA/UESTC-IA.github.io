<!DOCTYPE html>
<html lang="zh-CN" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>首页 | UESTC Interdisciplinary Association</title>
    <link rel="icon" href="assets/images/logo.ico" type="image/x-icon" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="assets/css/style.css" />
    <script src="assets/js/main.js" defer></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
  </head>
  <body class="pt-24">
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 min-h-screen">
      <section
        class="hero-shell elev-3 mb-8"
        x-data="{
          activeSlide: 1,
          totalSlides: 4,
          autoplay: null,
          start() { this.autoplay = setInterval(() => this.next(), 5200); },
          stop() { if (this.autoplay) clearInterval(this.autoplay); this.autoplay = null; },
          next() { this.activeSlide = this.activeSlide === this.totalSlides ? 1 : this.activeSlide + 1; },
          prev() { this.activeSlide = this.activeSlide === 1 ? this.totalSlides : this.activeSlide - 1; },
          jump(i) { this.activeSlide = i; }
        }"
        x-init="start()"
        @mouseenter="stop()"
        @mouseleave="start()"
      >
        <div class="hero-media min-h-[420px] md:min-h-[520px]">
          <div class="carousel-stack">
            <div
              class="carousel-slide"
              :class="{ 'active': activeSlide === 1 }"
            >
              <img
                src="assets/images/carousel/core_members.jpg"
                alt="核心成员"
              />
            </div>
            <div
              class="carousel-slide"
              :class="{ 'active': activeSlide === 2 }"
            >
              <img src="assets/images/carousel/research.jpg" alt="研究活动" />
            </div>
            <div
              class="carousel-slide"
              :class="{ 'active': activeSlide === 3 }"
            >
              <img src="assets/images/carousel/DPTech.jpg" alt="企业合作" />
            </div>
            <div
              class="carousel-slide"
              :class="{ 'active': activeSlide === 4 }"
            >
              <img src="assets/images/carousel/chengjie.jpg" alt="路演现场" />
            </div>
          </div>

          <button
            class="hero-nav hero-nav-left"
            @click="prev()"
            aria-label="上一张"
          >
            <i class="fa-solid fa-chevron-left"></i>
          </button>
          <button
            class="hero-nav hero-nav-right"
            @click="next()"
            aria-label="下一张"
          >
            <i class="fa-solid fa-chevron-right"></i>
          </button>

          <div class="hero-overlay">
            <div class="hero-copy">
              <p class="title-en text-sm mb-2">ACADEMIC TECH x FUTURE LAB</p>
              <h1 class="text-4xl md:text-5xl font-bold mb-3">
                交叉学科协会 · 未来实验场
              </h1>
              <p class="text-base md:text-lg">
                连接学院、产业与学生创新团队，以问题驱动研究，以实践沉淀成果。
              </p>
            </div>
            <div class="hero-hud" role="tablist" aria-label="轮播进度">
              <button
                class="hud-dot"
                :class="{ 'active': activeSlide === 1 }"
                @click="jump(1)"
                aria-label="第1张"
              ></button>
              <button
                class="hud-dot"
                :class="{ 'active': activeSlide === 2 }"
                @click="jump(2)"
                aria-label="第2张"
              ></button>
              <button
                class="hud-dot"
                :class="{ 'active': activeSlide === 3 }"
                @click="jump(3)"
                aria-label="第3张"
              ></button>
              <button
                class="hud-dot"
                :class="{ 'active': activeSlide === 4 }"
                @click="jump(4)"
                aria-label="第4张"
              ></button>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>
</body>

</html>
