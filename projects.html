<!doctype html>
<html lang="zh-CN" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="assets/images/logo.ico" type="image/x-icon" />
    <title>项目成果 | UESTC IA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="assets/css/style.css" />
    <script src="assets/js/main.js" defer></script>
  </head>
  <body class="pt-24">
    <main class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 min-h-screen mb-16">
      <div class="title-block mb-10">
        <div class="title-en">Projects</div>
        <h1 class="text-4xl font-bold">项目与成果</h1>
        <p>
          以真实需求牵引研发流程，持续沉淀可展示、可复用、可迭代的项目资产。
        </p>
      </div>
      <section class="mb-8">
        <article class="card-core p-6 md:p-8">
          <div class="grid md:grid-cols-[140px_1fr_auto] gap-5 items-start">
            <img
              src="assets/images/project/ytmsg/logo.png"
              alt="研途信使"
              class="w-28 h-28 rounded-2xl object-cover border border-cyan-100"
            />
            <div>
              <p class="title-en text-sm mb-2">Featured</p>
              <h2 class="text-3xl font-bold mb-2">研途信使</h2>
              <p>
                面向研究生与实验室的邮件与信息管理助手，提升通知、归档与检索效率。
              </p>
            </div>
            <a href="projects/ytmsg.html" class="btn btn-primary">查看详情</a>
          </div>
        </article>
      </section>
      <section class="grid md:grid-cols-2 gap-4">
        <article class="card-core p-6">
          <h3 class="text-2xl font-bold mb-2">更多项目孵化中</h3>
          <p class="mb-4">
            覆盖健康智能、工程系统与跨学科应用，欢迎成员共同推进。
          </p>
          <a href="join.html" class="btn btn-ghost">参与项目</a>
        </article>
        <article class="card-core p-6">
          <h3 class="text-2xl font-bold mb-2">提交你的课题</h3>
          <p class="mb-4">
            如果你有明确问题场景，我们支持“问题定义-方案验证-结果展示”快速迭代。
          </p>
          <a href="join.html" class="btn btn-secondary">发起合作</a>
        </article>
      </section>
    </main>
  </body>
</html>
