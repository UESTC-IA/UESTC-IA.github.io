<!doctype html>
<html lang="zh-CN" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="assets/images/logo.ico" type="image/x-icon" />
    <title>加入我们 | UESTC IA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="assets/css/style.css" />
    <script src="assets/js/main.js" defer></script>
  </head>
  <body class="pt-24">
    <main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 min-h-screen mb-16">
      <div class="title-block mb-10">
        <div class="title-en">Join UESTC IA</div>
        <h1 class="text-4xl font-bold">加入交叉学科协会</h1>
        <p>欢迎对跨学科研究、产业实践和项目协作感兴趣的同学加入我们。</p>
      </div>
      <section class="grid md:grid-cols-3 gap-4 mb-8">
        <article class="card-core p-6 text-center">
          <i class="fas fa-rocket text-2xl text-cyan-600 mb-3"></i>
          <h3 class="text-2xl font-bold mb-2">前沿训练</h3>
          <p>覆盖大模型、科研方法与工程实践。</p>
        </article>
        <article class="card-core p-6 text-center">
          <i class="fas fa-network-wired text-2xl text-cyan-600 mb-3"></i>
          <h3 class="text-2xl font-bold mb-2">资源连接</h3>
          <p>连接导师、企业与校友网络。</p>
        </article>
        <article class="card-core p-6 text-center">
          <i class="fas fa-user-graduate text-2xl text-cyan-600 mb-3"></i>
          <h3 class="text-2xl font-bold mb-2">成长路径</h3>
          <p>通过真实项目积累作品和经验。</p>
        </article>
      </section>
      <section class="card-core p-6 md:p-8 mb-8">
        <div class="section-title">
          <h2 class="text-3xl font-bold">加入流程</h2>
        </div>
        <p class="mb-5">扫码入群</p>
        <div class="grid md:grid-cols-2 gap-5">
          <div class="surface-2 p-4">
            <h3 class="text-xl font-bold mb-3">TechPulse 频道</h3>
            <img
              src="assets/images/join/TechPulse.png"
              alt="TechPulse"
              class="w-full max-w-[240px] mx-auto rounded-xl"
            />
          </div>
          <div class="surface-2 p-4">
            <h3 class="text-xl font-bold mb-3">QQ群</h3>
            <img
              src="assets/images/join/QQgroup.jpg"
              alt="QQ群"
              class="w-full max-w-[240px] mx-auto rounded-xl"
            />
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
